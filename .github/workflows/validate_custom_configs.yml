name: Validate concept configs

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/custom_concept_training/configs/*.yaml'
      - 'knowledge_graph/custom_classifier_config.py'
  pull_request:
    paths:
     - 'scripts/custom_concept_training/configs/*.yaml'
     - 'knowledge_graph/custom_classifier_config.py'
  workflow_dispatch:

jobs:
  validate-configs:
    runs-on: ubuntu-latest
    name: "Validate concept configs"
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        run: pipx install rust-just

      - name: Install python or load from cache with dependencies
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: just install

      - name: Validate configs
        run: uv run classifier-configs validate --check-all-configs